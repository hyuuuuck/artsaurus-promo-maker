name: Bootstrap standalone promo maker

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Replace repo with standalone source archive
        env:
          ARCHIVE_B64_URL: "https://gist.githubusercontent.com/Younghegalian/49a0ab4aa9defb3ecff16f18c21076d9/raw/ed17b2094625e3ff7b4f2537d7ea207863c25cba/artsaurus-promo-maker-43a6974.tgz.b64"
        run: |
          set -euo pipefail
          curl -fsSL "$ARCHIVE_B64_URL" -o /tmp/artsaurus-promo-maker.tgz.b64
          base64 -d /tmp/artsaurus-promo-maker.tgz.b64 > /tmp/artsaurus-promo-maker.tgz
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xzf /tmp/artsaurus-promo-maker.tgz -C .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Scaffold standalone promo maker app"
          git push origin HEAD:main
